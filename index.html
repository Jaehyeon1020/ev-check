<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes">
  <meta name="theme-color" content="#3498db">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <title>동탄파크푸르지오 충전기 현황</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
      background: #f5f5f7;
      color: #1c1c1e;
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
      padding-bottom: 80px;
    }
    header { margin-bottom: 16px; }
    h1 { font-size: 1.25rem; margin: 0 0 4px; font-weight: 700; }
    .updated { color: #8e8e93; font-size: 0.8rem; margin: 0; }

    .station {
      background: #fff;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    h2 { font-size: 1rem; margin: 0 0 2px; font-weight: 600; }
    h2 small { color: #8e8e93; font-weight: 400; font-size: 0.75rem; display: block; margin-top: 2px; }
    .summary {
      margin: 6px 0 14px;
      font-size: 0.9rem;
      color: #555;
      padding: 8px 12px;
      background: #f0f7ff;
      border-radius: 8px;
    }
    .summary strong { color: #2ecc71; font-size: 1.1rem; }

    .charger-list { display: flex; flex-direction: column; gap: 8px; }
    .charger {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px 14px;
      background: #fafafa;
      border-radius: 10px;
    }
    .charger-id { font-weight: 600; font-size: 0.9rem; color: #8e8e93; min-width: 44px; }
    .charger-info { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
    .tag {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 8px;
      background: #e8eefc;
      color: #2d4a8a;
      font-size: 1rem;
      font-weight: 700;
      width: fit-content;
    }
    .output { font-size: 0.75rem; color: #8e8e93; }
    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 20px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .loading, .error {
      text-align: center;
      padding: 40px 20px;
      color: #8e8e93;
      font-size: 0.9rem;
    }
    .error { color: #e74c3c; }

    #refresh-fab {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #3498db;
      color: #fff;
      border: none;
      font-size: 1.5rem;
      box-shadow: 0 3px 10px rgba(52,152,219,.4);
      cursor: pointer;
      transition: transform 0.15s;
      z-index: 10;
    }
    #refresh-fab:active { transform: scale(0.92); }
    #refresh-fab.loading { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (prefers-color-scheme: dark) {
      body { background: #000; color: #f2f2f7; }
      .station { background: #1c1c1e; }
      .charger { background: #2c2c2e; }
      .summary { background: #1a2838; color: #c7d6e8; }
      .updated, h2 small { color: #8e8e93; }
      .tag { background: #2d3a5c; color: #a8bef0; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🔌 동탄파크푸르지오 충전기</h1>
    <p class="updated" id="updated">불러오는 중...</p>
  </header>
  <div id="content"><p class="loading">데이터를 가져오는 중입니다...</p></div>
  <button id="refresh-fab" onclick="load()" aria-label="새로고침">↻</button>

  <script>
    const SERVICE_KEY = '70d9d335578e9fceb09425f85cc40a1976989c3fd59fe61962a4775daba7b7cf';

    const STATIONS = [
      { statId: 'PW801037', location: '지하주차장', tagOrder: ['102동 지하 1층', '107동 후문 쪽'] },
      { statId: 'PW801329', location: '', tagOrder: ['109동 지상', '105동 지상 후문 쪽'] },
    ];

    const CHARGER_TAGS = {
      'PW801329-01': '105동 지상 후문 쪽',
      'PW801329-02': '105동 지상 후문 쪽',
      'PW801329-03': '105동 지상 후문 쪽',
      'PW801329-04': '105동 지상 후문 쪽',
      'PW801329-05': '105동 지상 후문 쪽',
      'PW801329-06': '105동 지상 후문 쪽',
      'PW801329-07': '105동 지상 후문 쪽',
      'PW801329-08': '105동 지상 후문 쪽',
      'PW801329-09': '105동 지상 후문 쪽',
      'PW801329-10': '105동 지상 후문 쪽',
      'PW801329-11': '109동 지상',
      'PW801329-12': '109동 지상',
      'PW801329-13': '109동 지상',
      'PW801329-14': '109동 지상',
      'PW801037-01': '107동 후문 쪽',
      'PW801037-02': '107동 후문 쪽',
      'PW801037-03': '107동 후문 쪽',
      'PW801037-04': '107동 후문 쪽',
      'PW801037-05': '102동 지하 1층',
      'PW801037-06': '102동 지하 1층',
      'PW801037-07': '102동 지하 1층',
      'PW801037-08': '102동 지하 1층',
      'PW801037-09': '102동 지하 1층',
    };

    const STAT_MAP = {
      '0': { text: '알수없음', color: '#8e8e93' },
      '1': { text: '통신이상', color: '#e74c3c' },
      '2': { text: '사용가능', color: '#2ecc71' },
      '3': { text: '충전중',   color: '#3498db' },
      '4': { text: '운영중지', color: '#e67e22' },
      '5': { text: '점검중',   color: '#e67e22' },
    };

    async function fetchStation(statId) {
      const url = `https://apis.data.go.kr/B552584/EvCharger/getChargerInfo?serviceKey=${SERVICE_KEY}&numOfRows=9999&pageNo=1&dataType=JSON&statId=${statId}`;
      const res = await fetch(url);
      const data = await res.json();
      return data.items.item;
    }

    function renderStation(statId, location, items, tagOrder = []) {
      const label = location ? ` · ${location}` : '';
      const statName = items[0]?.statNm ?? statId;
      const available = items.filter(x => x.stat === '2').length;

      const sorted = [...items].sort((a, b) => {
        const tagA = CHARGER_TAGS[`${statId}-${a.chgerId}`] ?? '';
        const tagB = CHARGER_TAGS[`${statId}-${b.chgerId}`] ?? '';
        const idxA = tagOrder.indexOf(tagA);
        const idxB = tagOrder.indexOf(tagB);
        const rankA = idxA === -1 ? 999 : idxA;
        const rankB = idxB === -1 ? 999 : idxB;
        if (rankA !== rankB) return rankA - rankB;
        return a.chgerId.localeCompare(b.chgerId);
      });

      const chargers = sorted.map(x => {
        const chgerId = x.chgerId;
        const { text, color } = STAT_MAP[x.stat] ?? { text: '알수없음', color: '#8e8e93' };
        const tag = CHARGER_TAGS[`${statId}-${chgerId}`] ?? '';
        const tagHtml = tag ? `<span class="tag">${tag}</span>` : '';
        return `
          <div class="charger">
            <div class="charger-id">#${chgerId}</div>
            <div class="charger-info">
              ${tagHtml}
              <span class="output">${x.output}kW</span>
            </div>
            <span class="badge" style="background:${color}">${text}</span>
          </div>`;
      }).join('');

      return `
        <div class="station">
          <h2>${statName}${label}<small>${statId}</small></h2>
          <p class="summary">사용가능 <strong>${available}</strong> / 전체 ${items.length}기</p>
          <div class="charger-list">${chargers}</div>
        </div>`;
    }

    async function load() {
      const fab = document.getElementById('refresh-fab');
      fab.classList.add('loading');
      document.getElementById('updated').textContent = '불러오는 중...';
      try {
        const results = await Promise.all(STATIONS.map(s => fetchStation(s.statId)));
        const html = STATIONS.map((s, i) => renderStation(s.statId, s.location, results[i], s.tagOrder)).join('');
        document.getElementById('content').innerHTML = html;
        const now = new Date().toLocaleString('ko-KR', {
          timeZone: 'Asia/Seoul',
          month: '2-digit', day: '2-digit',
          hour: '2-digit', minute: '2-digit', second: '2-digit'
        });
        document.getElementById('updated').textContent = `${now} 기준`;
      } catch (e) {
        document.getElementById('content').innerHTML = `<p class="error">오류: ${e.message}</p>`;
      } finally {
        fab.classList.remove('loading');
      }
    }

    load();
  </script>
</body>
</html>
